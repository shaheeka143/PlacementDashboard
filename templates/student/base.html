<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Acadeno — Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="navbar">
    <div class="nav-inner">
      <div class="logo-area">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Acadeno" class="logo-img" onerror="this.style.display='none'">
        <div class="logo-text">ACADENO</div>
      </div>
      <nav class="nav-links">
        <a href="{{ url_for('student_dashboard') }}" class="nav-link {% if request.path == url_for('student_dashboard') %}active{% endif %}">Dashboard</a>
        <a href="{{ url_for('matching') }}" class="nav-link {% if request.path == url_for('matching') %}active{% endif %}">Job Match</a>
        <a href="{{ url_for('soft_skills') }}" class="nav-link {% if request.path == url_for('soft_skills') %}active{% endif %}">Soft Skills</a>
        <a href="{{ url_for('profiling') }}" class="nav-link {% if request.path == url_for('profiling') %}active{% endif %}">Profiling</a>
        <a href="{{ url_for('career_path') }}" class="nav-link {% if request.path == url_for('career_path') %}active{% endif %}">Career</a>
        <a href="{{ url_for('logout') }}" class="nav-link logout logout-btn">Logout</a>
      </nav>
    </div>
  </header>

  <div class="flash-container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, msg in messages %}
          <div class="flash-item flash-{{ category }}">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
  </div>

  <main class="page-container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
